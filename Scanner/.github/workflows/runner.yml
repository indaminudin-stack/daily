name: Scanner

on:
  schedule:
    - cron: '30 23 * * 1-5'  # 08:30 JST
    - cron: '30 0 * * 1-5'   # 09:30 JST
    - cron: '0 1 * * 1-5'    # 10:00 JST
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      working-directory: Scanner
      run: pip install -r requirements.txt

    - name: Run bot
      env:
        TOKEN: ${{ secrets.TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
      run: python run_daily.py
